<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Decision Map (Viz)</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="lib/tableau.extensions.1.latest.js"></script>
  <script src="lib/d3.min.js"></script>
  <style>
    /* Viz extensions own the whole worksheet area — no toolbar chrome. */
    html, body { height: 100%; }
    #content { position: absolute; inset: 0; overflow: auto; }
    #tree { display: block; }
    #hint {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; text-align: center; color: #6b6b6b;
      font-family: "Segoe UI", system-ui, sans-serif; font-size: 13px; padding: 24px;
    }
    #hint code { background: #eef1f4; padding: 1px 4px; border-radius: 3px; }
    .hidden { display: none !important; }

    /* Color editor */
    #colorBtn {
      position: absolute; top: 8px; right: 8px; z-index: 3;
      font-size: 12px; padding: 4px 9px; border: 1px solid #b8c4d0;
      border-radius: 4px; background: #fff; cursor: pointer;
    }
    #colorBtn:hover { background: #eef3f8; }
    #colorPanel {
      position: absolute; top: 38px; right: 8px; z-index: 3; width: 200px;
      max-height: 70%; overflow: auto; background: #fff; border: 1px solid #b8c4d0;
      border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
      font-family: "Segoe UI", system-ui, sans-serif; font-size: 12px;
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 8px; border-bottom: 1px solid #e3e8ee; font-weight: 600; color: #1f77b4;
    }
    .panel-head button { border: none; background: none; cursor: pointer; font-size: 15px; color: #6b6b6b; }
    .swatch-row { display: flex; align-items: center; gap: 8px; padding: 3px 8px; cursor: pointer; }
    .swatch-row:hover { background: #f5f8fb; }
    .swatch-row input[type=color] { width: 24px; height: 18px; border: 1px solid #ccc; padding: 0; cursor: pointer; }
    .swatch-label { color: #2b2b2b; }
  </style>
</head>
<body>
  <div id="content"><svg id="tree"></svg></div>

  <button id="colorBtn" class="hidden" title="Show / hide the legend (and edit node colors)">🎨 Legend</button>
  <div id="colorPanel" class="hidden">
    <div class="panel-head"><span>Legend — color = node (stage · value)</span><button id="colorClose" title="Hide">×</button></div>
    <div id="swatches"></div>
  </div>

  <div id="hint" class="hidden">
    Drop your stage fields on the <b>Stages</b> shelf in order
    (e.g. <code>i_state, 1_state, 2_state, 3_state</code>) — the first field is the
    root. Add as many stages as you have. Optionally drop a measure on <b>Size</b>.
  </div>

  <script src="js/build-tree.js"></script>
  <script src="js/render-tree.js"></script>
  <script src="js/color-panel.js"></script>
  <script src="js/decision-map-viz.js"></script>
</body>
</html>
